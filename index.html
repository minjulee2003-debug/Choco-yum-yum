<title> 쪼꼬야 밥먹어라</title>
<style>

.selector{position:fixed;top:62px;left:14px;z-index:11;background:rgba(255,255,255,.88);border:2px solid rgba(255,255,255,.95);border-radius:16px;padding:9px 12px;font-size:14px;font-weight:900;color:#234e24;box-shadow:0 6px 18px rgba(0,0,0,.12)}.selector button{margin-left:6px;border:0;border-radius:10px;padding:6px 9px;font-weight:900;background:#e9f6ff;color:#234e24;cursor:pointer}.selector button:hover{background:#d7efff}
.musicBtn{
  position:fixed;
  top:110px;
  right:14px;
  z-index:12;
  border:0;
  border-radius:14px;
  padding:9px 12px;
  font-size:14px;
  font-weight:900;
  background:rgba(255,255,255,.9);
  color:#234e24;
  box-shadow:0 6px 18px rgba(0,0,0,.12);
  cursor:pointer;
}

<div class="hud"><div class="pill">🍅🥒🍠 먹은 개수: <span id="score">0</span></div><div class="pill">🐶 상태: <span id="status">준비 중</span></div></div>
<div class="tip">화면을 눌러 쪼꼬한테 먹이주기</div>

<div class="selector">사람 선택: <button onclick="chooseHuman('basic')">민주</button><button onclick="chooseHuman('eunsu')">은수</button></div>
<canvas id="game"></canvas>
<audio id="bgm" src="bgm.mp3" loop preload="auto"></audio>
<button id="musicBtn" class="musicBtn">🎵 음악 켜기</button>
  
<script>
  
const canvas=document.getElementById('game'),ctx=canvas.getContext('2d'),scoreEl=document.getElementById('score'),statusEl=document.getElementById('status');ctx.imageSmoothingEnabled=false;
const bgm=document.getElementById('bgm');
const musicBtn=document.getElementById('musicBtn');
bgm.volume=0.35;

let musicOn=false;

async function toggleMusic(){
  try{
    if(!musicOn){
      await bgm.play();
      musicOn=true;
      musicBtn.textContent='🔇 음악 끄기';
    }else{
      bgm.pause();
      musicOn=false;
      musicBtn.textContent='🎵 음악 켜기';
    }
  }catch(err){
    console.log('음악 재생 실패:',err);
  }
}

musicBtn.addEventListener('click',e=>{
  e.stopPropagation();
  toggleMusic();
});

function drawBackground(dt){
  if (skyImg.complete) {
  ctx.drawImage(skyImg, 0, 0, W, groundY);
} else {
  const sky = ctx.createLinearGradient(0, 0, 0, groundY);
  sky.addColorStop(0, "#79cbff");
  sky.addColorStop(1, "#a6e3ff");
  ctx.fillStyle = sky;
  ctx.fillRect(0, 0, W, groundY);
}
  
  for(let y=groundY;y<H;y+=24){
    for(let x=0;x<W;x+=24){
      ctx.fillStyle=(((x+y)/24)%2===0)?'#61c24d':'#59b746';
      ctx.fillRect(x,y,24,24);
    }
  }
  for(let x=0;x<W;x+=18){
    const h=4+((x/18)%3)*2;
    ctx.fillStyle='#469a3b';
    ctx.fillRect(x,groundY-h,12,h);
  }

  if (sunImg.complete) {
  const sunSize = 120;
  ctx.drawImage(sunImg, W - 170, 30, sunSize, sunSize);
}
  function cloud(x,y,z){
  const cloudWidth=130*z;

  if(cloudImg.complete && cloudImg.naturalWidth>0){
    ctx.drawImage(cloudImg,x,y,cloudWidth,cloudHeight);
  }else{
    const p=8*z;
    const blocks=[[1,0,3,1],[4,1,2,1],[0,1,2,1],[0,2,7,2],[1,4,5,1]];
    ctx.fillStyle='#f9fdff';
    for(const [bx,by,bw,bh] of blocks){

    ctx.fillStyle='#d8ebff';

function heart(x,y,size){const s=size/6;ctx.fillStyle='#ff5c93';const b=[[1,0],[2,0],[4,0],[5,0],[0,1],[1,1],[2,1],[3,1],[4,1],[5,1],[6,1],[0,2],[1,2],[2,2],[3,2],[4,2],[5,2],[6,2],[1,3],[2,3],[3,3],[4,3],[5,3],[2,4],[3,4],[4,4],[3,5]];for(const [bx,by]of b)ctx.fillRect(Math.round(x+bx*s),Math.round(y+by*s),Math.ceil(s),Math.ceil(s))}
function startThrow(x,y){if(!ready||food)return;const tx=clamp(x,150,W-60),ty=clamp(y,groundY-90,groundY-12);food={type:foods[Math.floor(Math.random()*foods.length)],startX:person.x+60,startY:person.y-125,endX:tx,endY:ty,x:person.x+60,y:person.y-125,t:0,duration:.58,landed:false,eaten:false};person.throwTimer=.18;statusEl.textContent='음식 던지는 중'}
function update(dt){person.throwTimer=Math.max(0,person.throwTimer-dt);dog.bob+=dt*(dog.moving?11:3);if(food&&!food.landed){food.t+=dt/food.duration;const t=Math.min(food.t,1),ease=1-Math.pow(1-t,3),arc=Math.sin(t*Math.PI)*100;food.x=lerp(food.startX,food.endX,ease);food.y=lerp(food.startY,food.endY,ease)-arc;if(t>=1){food.landed=true;dog.targetX=food.endX;dog.facing=dog.targetX<dog.x?'left':'right';dog.moving=true;dog.userMoved=true;statusEl.textContent='먹이 발견'}}if(dog.moving){const dx=dog.targetX-dog.x,step=dog.speed*dt;if(Math.abs(dx)<=step){dog.x=dog.targetX;dog.moving=false;if(food&&food.landed&&!food.eaten){food.eaten=true;score++;scoreEl.textContent=score;statusEl.textContent='냠냠!';spawnHearts(dog.x-10,dog.y-110);setTimeout(()=>{food=null;statusEl.textContent='기다리는 중'},260)}}else dog.x+=Math.sign(dx)*step}for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.life-=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=45*dt;if(p.life<=0)particles.splice(i,1)}}
function render(dt){ctx.clearRect(0,0,W,H);drawBackground(dt);if(!ready)return;const hf=selectedHuman==='eunsu'?(person.throwTimer>0?F.eunsuThrow:F.eunsuIdle):(person.throwTimer>0?F.humanThrow:F.humanIdle);drawFrame(hf,person.x,person.y,person.scale,0);if(food&&!food.eaten)drawFood(food.type,food.x-18,food.y-16,1.25);let df;if(dog.moving)df=dog.facing==='left'?F.dogLeftMove:F.dogRightMove;else df=dog.facing==='left'?F.dogLeftIdle:F.dogRightIdle;drawFrame(df,dog.x,dog.y,dog.scale,dog.moving?Math.sin(dog.bob)*4:Math.sin(dog.bob)*1.5);for(const p of particles){ctx.save();ctx.globalAlpha=Math.max(0,p.life);heart(p.x,p.y,p.size);ctx.restore()}}
function loop(ts){if(!last)last=ts;const dt=Math.min(.033,(ts-last)/1000);last=ts;update(dt);render(dt);requestAnimationFrame(loop)}
canvas.addEventListener('pointerdown',e=>startThrow(e.clientX,e.clientY));canvas.addEventListener('touchstart',e=>{const t=e.touches[0];if(t)startThrow(t.clientX,t.clientY)},{passive:true});window.addEventListener('resize',resize);
sprite.onload=()=>{ready=true;statusEl.textContent='기다리는 중';resize();requestAnimationFrame(loop)};resize();
</script>
</body>
