const F={
 dogLeftIdle:{x:0,y:0,w:98,h:133},dogLeftMove:{x:100,y:0,w:105,h:133},dogRightMove:{x:207,y:0,w:106,h:133},dogRightIdle:{x:315,y:0,w:96,h:133},humanIdle:{x:413,y:0,w:90,h:265},humanThrow:{x:505,y:0,w:82,h:265}
};
let W=0,H=0,groundY=0,last=0,score=0,ready=false,food=null;const foods=['tomato','cucumber','sweetpotato'];
const clouds=[{x:80,y:80,size:1.2,speed:13},{x:380,y:130,size:1.5,speed:9},{x:780,y:65,size:1.1,speed:15}];
const person={x:120,y:0,scale:.9,throwTimer:0};
const dog={x:700,y:0,targetX:700,scale:1.0,facing:'left',moving:false,speed:200,bob:0,userMoved:false};
const particles=[];
function clamp(v,a,b){return Math.max(a,Math.min(b,v))}function lerp(a,b,t){return a+(b-a)*t}function rand(a,b){return Math.random()*(b-a)+a}
function resize(){const dpr=Math.max(1,Math.min(2,window.devicePixelRatio||1));canvas.width=Math.floor(innerWidth*dpr);canvas.height=Math.floor(innerHeight*dpr);canvas.style.width=innerWidth+'px';canvas.style.height=innerHeight+'px';ctx.setTransform(dpr,0,0,dpr,0,0);ctx.imageSmoothingEnabled=false;W=innerWidth;H=innerHeight;groundY=Math.floor(H*.76);person.x=Math.max(90,W*.16);person.y=groundY;person.scale=clamp(W/1600,.72,1.05);dog.scale=clamp(W/2600,.5,.75);dog.y=groundY;if(!dog.userMoved){dog.x=Math.max(260,W*.73);dog.targetX=dog.x}else{dog.x=clamp(dog.x,110,W-80);dog.targetX=clamp(dog.targetX,110,W-80)}}
function drawFrame(fr,x,y,s,bob=0){const dw=Math.round(fr.w*s),dh=Math.round(fr.h*s),dx=Math.round(x-dw/2),dy=Math.round(y-dh+bob);ctx.drawImage(sprite,fr.x,fr.y,fr.w,fr.h,dx,dy,dw,dh)}
function cloud(x,y,z){const p=8*z,blocks=[[1,0,3,1],[4,1,2,1],[0,1,2,1],[0,2,7,2],[1,4,5,1]];ctx.fillStyle='#f9fdff';for(const [bx,by,bw,bh] of blocks)ctx.fillRect(Math.round(x+bx*p),Math.round(y+by*p),Math.ceil(bw*p),Math.ceil(bh*p));ctx.fillStyle='#d8ebff';ctx.fillRect(Math.round(x+p),Math.round(y+4.3*p),Math.ceil(5*p),Math.ceil(.5*p))}
function drawBackground(dt){const sky=ctx.createLinearGradient(0,0,0,groundY);sky.addColorStop(0,'#79cbff');sky.addColorStop(1,'#a6e3ff');ctx.fillStyle=sky;ctx.fillRect(0,0,W,groundY);ctx.fillStyle='#65c951';ctx.fillRect(0,groundY,W,H-groundY);for(let y=groundY;y<H;y+=24)for(let x=0;x<W;x+=24){ctx.fillStyle=(((x+y)/24)%2===0)?'#61c24d':'#59b746';ctx.fillRect(x,y,24,24)}for(let x=0;x<W;x+=18){const h=4+((x/18)%3)*2;ctx.fillStyle='#469a3b';ctx.fillRect(x,groundY-h,12,h)}ctx.fillStyle='#ffd766';ctx.fillRect(W-110,48,40,40);ctx.fillStyle='#ffea95';ctx.fillRect(W-98,36,16,12);ctx.fillRect(W-98,88,16,12);ctx.fillRect(W-122,60,12,16);ctx.fillRect(W-58,60,12,16);for(const c of clouds){c.x+=c.speed*dt;if(c.x>W+120)c.x=-140;cloud(c.x,c.y,c.size)}}
function drawFood(type,x,y,scale=1){const p=6*scale;function r(rx,ry,rw,rh,color){ctx.fillStyle=color;ctx.fillRect(Math.round(x+rx*p),Math.round(y+ry*p),Math.ceil(rw*p),Math.ceil(rh*p))}if(type==='tomato'){r(1,0,2,1,'#2fa23f');r(0,1,4,1,'#f24e46');r(0,2,4,3,'#da2f2b');r(1,5,2,1,'#bd2321');r(1,2,1,1,'#ff9a89')}else if(type==='cucumber'){r(1,0,5,1,'#4ec161');r(0,1,7,3,'#6ad774');r(1,4,5,1,'#3f9e49');r(0,1,1,3,'#286d31');r(6,1,1,3,'#286d31')}else{r(1,0,4,1,'#b86c34');r(0,1,6,3,'#c98345');r(1,4,4,2,'#aa6131');r(2,1,2,1,'#e1ad66')}}
function spawnHearts(x,y){for(let i=0;i<6;i++)particles.push({x,y,vx:rand(-25,25),vy:rand(-70,-35),life:1,size:rand(10,16)})}
function heart(x,y,size){const s=size/6;ctx.fillStyle='#ff5c93';const b=[[1,0],[2,0],[4,0],[5,0],[0,1],[1,1],[2,1],[3,1],[4,1],[5,1],[6,1],[0,2],[1,2],[2,2],[3,2],[4,2],[5,2],[6,2],[1,3],[2,3],[3,3],[4,3],[5,3],[2,4],[3,4],[4,4],[3,5]];for(const [bx,by]of b)ctx.fillRect(Math.round(x+bx*s),Math.round(y+by*s),Math.ceil(s),Math.ceil(s))}
function startThrow(x,y){if(!ready||food)return;const tx=clamp(x,150,W-60),ty=clamp(y,groundY-90,groundY-12);food={type:foods[Math.floor(Math.random()*foods.length)],startX:person.x+60,startY:person.y-125,endX:tx,endY:ty,x:person.x+60,y:person.y-125,t:0,duration:.58,landed:false,eaten:false};person.throwTimer=.18;statusEl.textContent='음식 던지는 중'}
function update(dt){person.throwTimer=Math.max(0,person.throwTimer-dt);dog.bob+=dt*(dog.moving?11:3);if(food&&!food.landed){food.t+=dt/food.duration;const t=Math.min(food.t,1),ease=1-Math.pow(1-t,3),arc=Math.sin(t*Math.PI)*100;food.x=lerp(food.startX,food.endX,ease);food.y=lerp(food.startY,food.endY,ease)-arc;if(t>=1){food.landed=true;dog.targetX=food.endX;dog.facing=dog.targetX<dog.x?'left':'right';dog.moving=true;dog.userMoved=true;statusEl.textContent='쪼꼬가 먹으러 달려간다'}}if(dog.moving){const dx=dog.targetX-dog.x,step=dog.speed*dt;if(Math.abs(dx)<=step){dog.x=dog.targetX;dog.moving=false;if(food&&food.landed&&!food.eaten){food.eaten=true;score++;scoreEl.textContent=score;statusEl.textContent='냠냠!';spawnHearts(dog.x-10,dog.y-110);setTimeout(()=>{food=null;statusEl.textContent='기다리는 중'},260)}}else dog.x+=Math.sign(dx)*step}for(let i=particles.length-1;i>=0;i--){const p=particles[i];p.life-=dt;p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=45*dt;if(p.life<=0)particles.splice(i,1)}}
function render(dt){ctx.clearRect(0,0,W,H);drawBackground(dt);if(!ready)return;drawFrame(person.throwTimer>0?F.humanThrow:F.humanIdle,person.x,person.y,person.scale,0);if(food&&!food.eaten)drawFood(food.type,food.x-18,food.y-16,1.25);let df;if(dog.moving)df=dog.facing==='left'?F.dogLeftMove:F.dogRightMove;else df=dog.facing==='left'?F.dogLeftIdle:F.dogRightIdle;drawFrame(df,dog.x,dog.y,dog.scale,dog.moving?Math.sin(dog.bob)*4:Math.sin(dog.bob)*1.5);for(const p of particles){ctx.save();ctx.globalAlpha=Math.max(0,p.life);heart(p.x,p.y,p.size);ctx.restore()}}
function loop(ts){if(!last)last=ts;const dt=Math.min(.033,(ts-last)/1000);last=ts;update(dt);render(dt);requestAnimationFrame(loop)}
canvas.addEventListener('pointerdown',e=>startThrow(e.clientX,e.clientY));canvas.addEventListener('touchstart',e=>{const t=e.touches[0];if(t)startThrow(t.clientX,t.clientY)},{passive:true});window.addEventListener('resize',resize);
sprite.onload=()=>{ready=true;statusEl.textContent='기다리는 중';resize();requestAnimationFrame(loop)};resize();
</script>
